{% extends 'main.html' %}
{% block content %}
<main class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded shadow">
        <div class="flex items-center space-x-2">
            <a href="{% url 'home' %}" class="text-gray-600 hover:text-gray-900">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
            <h2 class="text-xl font-semibold">Create Room</h2>
        </div>
        <form class="mt-8 space-y-6" action="" method="POST">
            {% csrf_token %}
            <div class="rounded-md shadow-sm -space-y-px">
                {% for field in form %}
                <div class="mb-4">
                    {{ field.label_tag }}
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-red-500 text-sm">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
            </div>
            <div class="flex justify-between">
                <a href="{% url 'home' %}" class="text-blue-500 hover:underline">Cancel</a>
                <button type="submit" class="ml-4 group relative px-6 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Create Room
                </button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
