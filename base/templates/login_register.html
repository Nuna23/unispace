{% extends 'main.html' %}
{% block content %}
<main class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded shadow">
        {% if page == 'login' %}
        <h2 class="text-center text-3xl font-extrabold text-gray-900">Login</h2>
        <form class="mt-8 space-y-6" action="" method="POST">
            {% csrf_token %}
            <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="email" class="sr-only">Email address</label>
                    <input id="email" name="email" type="email" required placeholder="Email address"
                        class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />
                </div>
                <div>
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" name="password" type="password" required placeholder="Password"
                        class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />
                </div>
            </div>
            <div>
                <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Login
                </button>
            </div>
        </form>
        <p class="mt-2 text-center text-sm text-gray-600">
            Haven't signed up yet? <a href="{% url 'register' %}" class="font-medium text-blue-600 hover:text-blue-500">Sign up</a>
        </p>
        {% else %}
        <h2 class="text-center text-3xl font-extrabold text-gray-900">Register</h2>
        <form class="mt-8 space-y-2" action="" method="POST">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700">First name</label>
                <input type="text" name="first_name"
                class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Last name</label>
                <input type="text" name="last_name"
                class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" name="email"
                class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password1"
                class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password" name="password2"
                class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            {% if form.errors %}
            <div class="text-red-500">
                {{ form.errors }}
            </div>
            {% endif %}
            <div>
                <label class="block text-sm font-medium text-gray-700">Gender</label>

                <select name="gender"
                class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">

                {% for value, label in form.gender.field.choices %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}

                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Faculty</label>

                <select name="faculty"
                class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md">

                {% for value, label in form.faculty.field.choices %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}

                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Major</label>

                <select name="major"
                class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md">

                {% for value, label in form.major.field.choices %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}

                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Year</label>

                <select name="year"
                class="mt-1 w-full px-3 py-2 border border-gray-300 rounded-md">

                {% for value, label in form.year.field.choices %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}

                </select>
            </div>
            <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Register
            </button>
            <p class="mt-2 text-center text-sm text-gray-600">
                    Already signed up? <a href="{% url 'login' %}" class="font-medium text-blue-600 hover:text-blue-500">Login</a>
            </p>
        </form>
        {% endif %}
    </div>
</main>
{% endblock %}
